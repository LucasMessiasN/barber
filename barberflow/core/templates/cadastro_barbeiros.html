{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
    <h1>Cadastro de Barbeiros</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-outline-primary">Salvar</button>
        <a href="{% url 'lista_barbeiros' %}" class="btn btn-outline-secondary">Voltar</a>
    </form>
{% endblock %}
