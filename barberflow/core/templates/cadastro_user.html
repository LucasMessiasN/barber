{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h1>Cadastro de Atendimento</h1>
<hr>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-outline-primary" type="submit">Salvar</button>
    <a class="btn btn-outline-secondary" href="{% url 'lista_users' %}">Voltar</a>
</form>

{% endblock %}
